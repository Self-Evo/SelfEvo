    test_csv: /home/nan.huang/data/hoi4d/test_50.csv
    seq_col: "Annotation Path"
    img_ext: png
    debug: false
  sparse: true
  rot_only: true
  sparse_divisor: 10
  metric_thresholds: [5, 15, 30]

