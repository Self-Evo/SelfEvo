Re10K:
  cfg:
    _target_: re10k.Re10KDataset
    Re10K_DIR: /home/ed25519/data/re10k/re10k/test
    seq_file: /home/ed25519/data/re10k/sequences/re10k_test_1719.txt
    cache_file: /home/ed25519/data/re10k/dataset_cache/re10k_relpose_test1719_cache.npy
  sampling:
    strategy: random_order
    num_frames: 10
  seq_id_map: /home/ed25519/data/re10k/seq-id-maps/Re10K_relpose_seq-id-map_seed${seed}.json
  metric_thresholds: [5, 15, 30]

hoi4d:
  cfg:
    _target_: hoi4d.HOI4DCameraDataset
    images_root: /home/nan.huang/data/hoi4d/HOI4D_release/images
