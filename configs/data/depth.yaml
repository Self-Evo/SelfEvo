kitti:
  type: video  # with sequences of video
  root_path: /home/nan.huang/data/eval/monst3r/data/kitti/depth_selection/val_selection_cropped
  ls_all_seqs: ${data.kitti.root_path}/image_gathered
  img:
    path: ${data.kitti.root_path}/image_gathered/{seq}
    ext: png
  depth:
    path: ${data.kitti.root_path}/groundtruth_depth_gathered/{seq}
    ext: png
  sparse: false 

hoi4d:
  type: video
  sparse: true
  eval_gap: 10
  ls_all_seqs: /home/nan.huang/data/hoi4d/test_50.csv
  seq_col: "Annotation Path"
  img:
    path: /home/nan.huang/data/hoi4d/HOI4D_release/images/{seq}
    ext: png
  depth:
    path: /home/nan.huang/data/hoi4d/OmniWorld-HOI4D/{seq}/prior_depth
    ext: png

droid:
  type: video
  format: droid
  eval_gap: 10
  frames_root: /home/nan.huang/data/OmniWorld-DROID_benchmark/DROID_png_frames
  anno_root: /home/nan.huang/data/OmniWorld-DROID_benchmark/depths   # parent of all subsets
  subset_glob: omniworld_droid_*    # or subset_list: [omniworld_droid_5000_5049, ...]
  metadata_csv: /home/nan.huang/data/OmniWorld-DROID_random/omniworld_droid_metadata.csv
  ext_keep_indices: [1, 2]          # optional: keep only ext1 -> [1], only ext2 -> [2]
  img: { ext: png }
  depth: { ext: png }
  only_fixed_views: false            # keep ext cams only, drop wrist
  only_wrist_views: true
  # seq_cache_file: /home/nan.huang/data/OmniWorld-DROID_benchmark/cache/droid_fixed_ext12_seqs.json
  # seq_cache_file: /home/nan.huang/data/OmniWorld-DROID_benchmark/cache/droid_all_ext12_seqs.json
  seq_cache_file: /home/nan.huang/data/OmniWorld-DROID_benchmark/cache/droid_wrist_ext12_seqs.json
  refresh_seq_cache: false   # 想强制重建就设 true
  max_seqs: 200          # 想要多少就写多少；不写/<=0 就不采样
  seq_sample_seed: 42    # 固定随机种子
  sparse: True

gamegeo:
  type: video  # with sequences of video
  root_path: /home/nan.huang/data/OmniWorld/benchmark
  ls_all_seqs: ${data.gamegeo.root_path}/geometric_prediction
  sparse: True
  eval_gap: 10
  img:
    path: ${data.gamegeo.root_path}/geometric_prediction/{seq}/image
    ext: png
  depth:
    path: ${data.gamegeo.root_path}/geometric_prediction/{seq}/depth
    ext: npy

gamevideo:
